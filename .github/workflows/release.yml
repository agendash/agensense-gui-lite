name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-builds-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.5"

jobs:
  validate:
    name: Validate Flutter project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Stage Android artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/agensense-gui-lite-android-release.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/agensense-gui-lite-android-release.aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agensense-gui-lite-android
          path: dist/*
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Package Web bundle
        run: |
          mkdir -p dist
          tar -C build -czf dist/agensense-gui-lite-web.tar.gz web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: agensense-gui-lite-web
          path: dist/agensense-gui-lite-web.tar.gz
          if-no-files-found: error

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libgtk-3-dev \
            liblzma-dev \
            libpulse-dev \
            ninja-build \
            pkg-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release -czf dist/agensense-gui-lite-linux-x64.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: agensense-gui-lite-linux-x64
          path: dist/agensense-gui-lite-linux-x64.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          mkdir -p dist
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -type d | head -n 1)"
          test -n "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" dist/agensense-gui-lite-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: agensense-gui-lite-macos
          path: dist/agensense-gui-lite-macos.zip
          if-no-files-found: error

  build-ios:
    name: Build iOS no-codesign
    runs-on: macos-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without code signing
        run: flutter build ios --release --no-codesign

      - name: Package iOS app
        run: |
          mkdir -p dist
          app_path="$(find build/ios/iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          test -n "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" dist/agensense-gui-lite-ios-nosign.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: agensense-gui-lite-ios-nosign
          path: dist/agensense-gui-lite-ios-nosign.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath dist\agensense-gui-lite-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: agensense-gui-lite-windows-x64
          path: dist/agensense-gui-lite-windows-x64.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-web
      - build-linux
      - build-macos
      - build-ios
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -maxdepth 1 -type f -print | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
